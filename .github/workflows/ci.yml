name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (all workspace members)
        run: cargo build --workspace
      - name: Unit tests
        run: cargo test -p lez-framework-core -p lez-framework-macros -p lez-cli -p lez-client-gen
      - name: E2E tests
        run: cargo test -p lez-framework
